{% extends 'base.html' %}
{% block content %}

<div class="page-header">
    <div>
        <h1>Editar Produto</h1>
        <p>Atualize os dados do produto</p>
    </div>
    <a href="/estoque" class="btn btn-secondary">← Voltar</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Nome do Produto</label>
            <input name="nome" value="{{ produto.NM_PRODUTO }}" required>
        </div>
        <div class="form-group">
            <label>Descrição</label>
            <input name="descricao" value="{{ produto.DS_PRODUTO }}" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Preço (R$)</label>
                <input name="preco" type="number" step="0.01" min="0" value="{{ produto.VR_PRODUTO }}" required>
            </div>
            <div class="form-group">
                <label>Quantidade</label>
                <input name="quantidade" type="number" min="0" value="{{ produto.QT_PRODUTO }}" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">Salvar Alterações</button>
    </form>
</div>

{% endblock %}
