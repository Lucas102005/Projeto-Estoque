{% extends "base.html" %}

{% block content %}

<div class = "card p-4 shadow">
    <h3>Cadastrar Usuário</h3>

    <form method = "POST">

        <input 
          class = "form-control mb-3" 
          name = "nome" 
          placeholder = "Nome" 
          required>

        <input 
          class = "form-control mb-3" 
          type = "email" 
          name = "email" 
          placeholder = "Email" 
          required>

        <input 
          class="form-control mb-3"
          type="password" 
          name="senha" 
          placeholder="Senha"
          required>

        <input 
          class = "form-control mb-3"
          type = "date"
          name = "nascimento"
          min = "1950-01-01"
          max = "2025-12-31"
          required>

        <select 
          class="form-control mb-3" 
          name="funcao">
            <option value = "vendedor"> Vendedor </option>
            <option value = "comprador"> Comprador </option>
        </select>

        <select 
          class = "form-control mb-3" 
          name = "genero">
            <option value = "Masculino"> Masculino </option>
            <option value = "Feminino"> Feminino</option>
            <option value = "Outro"> Outro </option>
        </select> 

        <button 
          class = "btn btn-primary w-100"> Cadastrar 
        </button>

    </form>
</div>

{% endblock %}
